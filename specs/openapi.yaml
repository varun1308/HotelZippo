  /mcp/docs:
    get:
      operationId: DocsIndex
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnyJson'
              examples:
                example1:
                  value: |-
                    <!DOCTYPE html>
                    <html lang="en">
                    <head>
                      <meta charset="UTF-8">
                      <title>RouteStack Travel MCP Server</title>
                      <style>body{font-family:sans-serif;max-width:800px;margin:2rem auto;line-height:1.5}h1,h2{color:#333;}a{color:#0066cc;}</style>
                    </head>
                    <body>
                      <h1>RouteStack Hotel Booking MCP Server</h1>
                      <p>This service exposes a set of skillset APIs (hotel/flight/car) that
                      can be consumed by AI agents and other clients.  You can interact with the
                      web application or call the endpoints directly.</p>

                      <h2>Getting started</h2>
                      <p>If you are browsing this in a browser the root URL redirects to this page.</p>
                      <ol>
                        <li>Authenticate by POSTing to
                          <code>/mcp/auth/login</code> (or <code>/auth/login</code> if the server is mounted
                          without the <code>/mcp</code> prefix).</li>
                        <li>Use the returned JWT as a bearer token for further requests.</li>
                      </ol>

                      <h2 id="auth">Auth endpoints</h2>
                      <p>The only public endpoint is <code>/mcp/auth/login</code>. Send a JSON
                      body with <code>username</code> and <code>password</code> to receive a
                      JWT. All other API calls require the token in an <code>Authorization:
                      Bearer &lt;token&gt;</code> header.</p>

                      <h2 id="api-docs">API documentation</h2>
                      <p>This server can be hosted at the root (e.g. <code>/docs</code>) or behind a path prefix
                      (commonly <code>/mcp</code>, e.g. <code>/mcp/docs</code>). The links below automatically adapt
                      to whichever mode you're currently browsing.</p>
                      <ul>
                        <li><a id="link-openapi-yaml" href="#">OpenAPI spec (YAML)</a></li>
                        <li><a id="link-openapi-json" href="#">OpenAPI spec (JSON redirect)</a></li>
                        <li><a id="link-api-html" href="#">API reference (HTML)</a></li>
                        <li><a id="link-capabilities" href="#">Capabilities / tool catalog</a></li>
                        <li><a id="link-postman" href="#">Postman collection</a></li>
                      </ul>

                      <h2>Helpers & samples</h2>
                      <ul>
                        <li><a id="link-skills" href="#">Skillset descriptions</a></li>
                        <li><a id="link-quickstart" href="#">Quickstart guide</a></li>
                      </ul>

                      <h2>FAQ</h2>
                      <p>If you are deploying behind a load balancer or reverse-proxy that
                      rewrites paths, make sure you request <code>/openapi.yaml</code> (or
                      <code>/mcp/openapi.yaml</code> when a base path is in use) rather than the
                      root. </p>

                      <p>For any issues, check the GitHub repository or contact the API maintainer.</p>

                      <script>
                        (function () {
                          // Determine whether we're mounted under /mcp.
                          // When browsing /mcp/docs, assets live under /mcp/docs/* and /mcp/*.
                          var isPrefixed = window.location.pathname.indexOf('/mcp/') === 0;
                          var prefix = isPrefixed ? '/mcp' : '';
                          var docsBase = prefix + '/docs';

                          function setHref(id, href) {
                            var el = document.getElementById(id);
                            if (!el) return;
                            el.setAttribute('href', href);
                            // show full path for copy/paste
                            el.textContent = href;
                          }

                          setHref('link-openapi-yaml', docsBase + '/openapi.yaml');
                          setHref('link-openapi-json', docsBase + '/openapi.json');
                          setHref('link-api-html', docsBase + '/api.html');
                          setHref('link-capabilities', docsBase + '/capabilities.json');
                          setHref('link-postman', docsBase + '/postman_collection.json');
                          setHref('link-skills', docsBase + '/SKILLS.md');
                          setHref('link-quickstart', docsBase + '/QUICKSTART.md');
                        })();
                      </script>
                    </body>
                    </html>
      description: Docs landing page (HTML).
      tags:
        - Docs
      security: []
      parameters: []
servers:
  - url: /
tags:
  - name: General
    description: Health and system status.
  - name: Authentication
    description: Partner token exchange and JWT inspection.
  - name: Hotels
    description: >-
      Hotel search, details, rooms, pricing, and payment URL. After
      search-hotels, persist result.token and result.correlationId. For
      details+rooms: either call get-hotel-details-and-rates once, OR
      get-hotel-details and get-rooms-and-rates—do not use both patterns for the
      same step.
  - name: Flights
    description: >-
      Flight search, revalidation, and payment URL. Upstream correlation headers
      are set inside MCP; external clients do not send X-Correlation-Id.
  - name: Cars
    description: >-
      Car rental search and payment URL. Upstream correlation headers are set
      inside MCP; external clients do not send X-Correlation-Id.
  - name: Auth
  - name: Hotel
  - name: Flight
  - name: Car
  - name: Docs
x-tagGroups:
  - name: Skills
    tags:
      - Auth
      - Hotel
      - Flight
      - Car
      - Docs
