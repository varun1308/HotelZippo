openapi: 3.0.0
components:
  examples: {}
  headers: {}
  parameters: {}
  requestBodies: {}
  responses: {}
  schemas:
    Record_string.unknown_:
      properties: {}
      additionalProperties: {}
      type: object
      description: Construct a type with a set of properties K of type T
    AnyJson:
      $ref: '#/components/schemas/Record_string.unknown_'
    PartnerTokenRequest:
      properties:
        nonce:
          type: string
          description: Random nonce to prevent replay attacks.
        timestamp:
          type: number
          format: double
          description: Unix timestamp (seconds).
        hmac:
          type: string
          description: >-
            HMAC signature of `apiKey:timestamp:nonce` using the partner secret
            key.
        apiKey:
          type: string
          description: Partner API key (public identifier).
      required:
        - nonce
        - timestamp
        - hmac
        - apiKey
      type: object
    HotelSearchDestinationItem:
      properties:
        coordinates:
          properties:
            long:
              type: number
              format: double
            lat:
              type: number
              format: double
          type: object
        id:
          type: string
        country:
          type: string
        fullName:
          type: string
        referenceId:
          type: string
          nullable: true
        type:
          type: string
        city:
          type: string
          nullable: true
      type: object
    HotelSearchDestinationsResponse:
      properties:
        result:
          items:
            $ref: '#/components/schemas/HotelSearchDestinationItem'
          type: array
          nullable: true
        code:
          type: number
          format: double
        message:
          type: string
          nullable: true
        success:
          type: boolean
      required:
        - success
      type: object
    HotelSearchDestinationsRequest:
      properties:
        type:
          type: string
          enum:
            - DESTINATION
            - HOTEL
        query:
          type: string
      required:
        - query
      type: object
    HotelSearchHotel:
      properties:
        mainamenity:
          type: string
        reviews:
          properties:
            rating:
              type: number
              format: double
            count:
              type: number
              format: double
          type: object
        contact:
          properties:
            address:
              properties:
                country:
                  properties:
                    name:
                      type: string
                    code:
                      type: string
                  type: object
                city:
                  properties:
                    name:
                      type: string
                  type: object
                line1:
                  type: string
              type: object
          type: object
        heroImage:
          type: string
        distance:
          type: number
          format: double
        facilities:
          items:
            type: string
          type: array
        saving:
          type: number
          format: double
        baseprice:
          type: number
          format: double
        ourprice:
          type: number
          format: double
        starRating:
          type: number
          format: double
        providerName:
          type: string
        name:
          type: string
        id:
          type: string
      type: object
    HotelSearchResult:
      properties:
        result:
          items:
            $ref: '#/components/schemas/HotelSearchHotel'
          type: array
        currency:
          type: string
        correlationId:
          type: string
          description: >-
            Search-session id for this hotel listing. **Return it from
            `search-hotels` and pass the same value**

            on `get-hotel-details`, `get-rooms-and-rates`, `revalidate`, and
            `get-payment-url` (see each operation).

            Do not invent this id client-side. Session length is bounded by
            server TTL (default 2h; `CORRELATION_ID_TTL_MS`).
        token:
          type: string
          description: >-
            **Listing session token** from the provider for this search result
            set. It belongs to the same **search session**

            as `correlationId` (from `search-hotels`). Copy both into later
            calls (`get-hotel-details`, `get-rooms-and-rates`,

            or the combined `get-hotel-details-and-rates`) until the user starts
            a new search or the session expires.

            Do not invent this value; always take it from the latest
            `search-hotels` response for that hotel flow.
        count:
          type: number
          format: double
        nextResultsKey:
          type: string
        status:
          type: string
      type: object
    HotelSearchResponse:
      properties:
        result:
          allOf:
            - $ref: '#/components/schemas/HotelSearchResult'
          nullable: true
        code:
          type: number
          format: double
        message:
          type: string
          nullable: true
        success:
          type: boolean
      required:
        - success
      type: object
    HotelRoomOccupancy:
      properties:
        childAges:
          items:
            type: number
            format: double
          type: array
        children:
          type: number
          format: double
        adults:
          type: number
          format: double
      type: object
    HotelSearchRequest:
      properties:
        currency:
          type: string
        long:
          type: number
          format: double
        lat:
          type: number
          format: double
        rooms:
          items:
            $ref: '#/components/schemas/HotelRoomOccupancy'
          type: array
        checkOut:
          type: string
        checkIn:
          type: string
        destinationType:
          type: string
        destinationId:
          type: string
      required:
        - long
        - lat
        - rooms
        - checkOut
        - checkIn
        - destinationId
      type: object
    HotelGetHotelDetailsRequest:
      properties:
        contentType:
          type: string
        correlationId:
          type: string
          description: >-
            Same `correlationId` as returned by `/mcp/hotel/search-hotels` for
            this listing session.
        token:
          type: string
          description: >-
            **Listing session token** from `search-hotels` (`result.token`) for
            this hotel and search session. Must pair with

            the same `correlationId` you used from that search. If you use the
            **combined** endpoint instead, you do not call

            this route for the same step.
        hotelId:
          type: string
      required:
        - hotelId
      type: object
      description: >-
        POST /mcp/hotel/get-hotel-details — use with `get-rooms-and-rates`
        **or** use combined `get-hotel-details-and-rates`, not both.
    HotelGetRoomsAndRatesRequest:
      properties:
        publishedRate:
          type: number
          format: double
        hotelName:
          type: string
        correlationId:
          type: string
          description: Same `correlationId` as returned by `/mcp/hotel/search-hotels`.
        rooms:
          items:
            $ref: '#/components/schemas/HotelRoomOccupancy'
          type: array
        checkOut:
          type: string
        checkIn:
          type: string
        token:
          type: string
          description: >-
            **Listing session token** from `search-hotels` (`result.token`),
            same search session as `correlationId`.

            Some flows first call `get-hotel-details` and use the token from
            that response where the provider requires it.
        hotelId:
          type: string
      required:
        - rooms
        - checkOut
        - checkIn
        - token
        - hotelId
      type: object
      description: >-
        POST /mcp/hotel/get-rooms-and-rates — pair with `get-hotel-details`
        **or** use `get-hotel-details-and-rates` alone, not both.
    HotelDetailsAndRatesRequest:
      properties:
        publishedRate:
          type: number
          format: double
        hotelName:
          type: string
        contentType:
          type: string
        correlationId:
          type: string
          description: >-
            Same `correlationId` as returned by `/mcp/hotel/search-hotels` for
            this listing session.
        rooms:
          items:
            $ref: '#/components/schemas/HotelRoomOccupancy'
          type: array
        checkOut:
          type: string
        checkIn:
          type: string
        token:
          type: string
          description: >-
            **Listing session token** from `search-hotels` (`result.token`) for
            this hotel, together with `correlationId`

            from the same response. Use this combined endpoint **instead of**
            the two separate detail/rooms calls for the same

            booking step—not in addition to them.
        hotelId:
          type: string
      required:
        - rooms
        - checkOut
        - checkIn
        - token
        - hotelId
      type: object
      description: >-
        POST /mcp/hotel/get-hotel-details-and-rates — **alternative** to calling
        `get-hotel-details` + `get-rooms-and-rates` separately.
    PaymentUrlResponse:
      properties:
        url:
          type: string
        success:
          type: boolean
      required:
        - url
        - success
      type: object
    HotelPaymentUrlRequest:
      properties:
        portalUrl:
          type: string
        priceCheckResult:
          $ref: '#/components/schemas/Record_string.unknown_'
        correlationId:
          type: string
          description: >-
            Same `correlationId` as returned by `/mcp/hotel/search-hotels` when
            still in the same listing session.
        hotelName:
          type: string
        checkOut:
          type: string
        checkIn:
          type: string
        recommendationId:
          type: string
        roomId:
          type: string
        token:
          type: string
          description: >-
            **Session token** for this booking path from prior steps (search +
            rooms/rates / revalidate), paired with

            `correlationId` when the provider expects it.
        hotelId:
          type: string
      required:
        - checkOut
        - checkIn
        - recommendationId
        - roomId
        - token
        - hotelId
      type: object
    HotelRevalidateRequest:
      properties:
        correlationId:
          type: string
          description: Same `correlationId` as returned by `/mcp/hotel/search-hotels`.
        publishedRate:
          type: number
          format: double
        token:
          type: string
          description: >-
            **Rate or listing token** from the provider for the selected
            room/offer—typically the same session token you have

            been passing from `search-hotels` / rooms-and-rates (opaque string;
            treat with `correlationId` as one session).
        recommendationId:
          type: string
        hotelId:
          type: string
      required:
        - token
        - recommendationId
        - hotelId
      type: object
    HotelBookingIdRequest:
      properties:
        bookingId:
          type: string
      required:
        - bookingId
      type: object
    HotelListBookingsRequest:
      properties:
        offset:
          type: number
          format: double
        limit:
          type: number
          format: double
        module:
          type: string
          description: Optional vertical filter, e.g. HOTEL, FLIGHT, CAR when supported.
        status:
          type: string
          enum:
            - UPCOMING
            - CANCELLED
            - COMPLETED
          description: 'Filter: UPCOMING (default), CANCELLED, or COMPLETED.'
      type: object
      description: >-
        POST /mcp/hotel/list-bookings — requires member/club context from
        account auth.
    FlightLocationsRequest:
      properties:
        term:
          type: string
      required:
        - term
      type: object
    FlightSearchRequest:
      $ref: '#/components/schemas/Record_string.unknown_'
    FlightRevalidateRequest:
      properties:
        searchFilterObj:
          $ref: '#/components/schemas/Record_string.unknown_'
        searchListPrice:
          $ref: '#/components/schemas/Record_string.unknown_'
        fareSourceCode:
          type: string
      required:
        - fareSourceCode
      type: object
    CarLocationsRequest:
      properties:
        term:
          type: string
      required:
        - term
      type: object
    CarSearchRequest:
      $ref: '#/components/schemas/Record_string.unknown_'
    CarGetPaymentUrlRequest:
      properties:
        portalUrl:
          type: string
        car:
          $ref: '#/components/schemas/Record_string.unknown_'
        dropoffDate:
          type: string
        pickupDate:
          type: string
        dropoff:
          $ref: '#/components/schemas/Record_string.unknown_'
        pickup:
          $ref: '#/components/schemas/Record_string.unknown_'
      required:
        - car
        - dropoffDate
        - pickupDate
        - dropoff
        - pickup
      type: object
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
info:
  title: Travel Booking MCP API
  version: 1.0.0
  description: >-
    Generated from tsoa controllers. Public HTTP skill endpoints live under
    /mcp/*. For hotels, use provider `correlationId` and `token` from
    `search-hotels` in JSON request bodies where documented — see
    docs/EXTERNAL_MCP_INTEGRATION.md.
  license:
    name: MIT
  contact: {}
paths:
  /mcp/auth/partner-token:
    post:
      operationId: PartnerToken
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnyJson'
              examples:
                example1:
                  value:
                    token: >-
                      eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJhY2NvdW50SWQiOiI1MzY4NDYiLCJpYXQiOjE3NzU0NzY5MjksImV4cCI6MTc3NTU2MzMyOSwiaXNzIjoiY3RzLXBhcnRuZXIifQ.ixHsEr6zbH3x33vWCbJYxrVQ-VGT889LPMlK080GnUQ
                    expiresIn: 24h
      description: >-
        Exchange partner credentials for a short-lived bearer token (JWT).


        The frontend (or customer backend) uses this token to authenticate
        subsequent `/mcp/*` calls.


        Dependency notes:

        - Call this first, then send the returned JWT as `Authorization: Bearer
        <token>` on all other MCP requests.
      tags:
        - Auth
      security: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerTokenRequest'
            examples:
              sentExample1:
                value:
                  hmac: '-4-2mxxVi_c7J8lV4-Gb4MZsGYOpR7VREjim5T_StQ4'
                  timestamp: 1775476924
                  nonce: 9L8sYyY5gK664Tf6twSKiwSMYwmkbMco
  /mcp/hotel/search-destinations:
    post:
      operationId: SearchDestinations
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelSearchDestinationsResponse'
              examples:
                example1:
                  value:
                    success: true
                    message: data retrieved
                    code: 5128
                    result:
                      - city: null
                        type: City
                        referenceId: null
                        fullName: Pune, Maharashtra, India
                        country: IN
                        id: '328605'
                        coordinates:
                          lat: 18.520433
                          long: 73.856737
                      - city: null
                        type: State
                        referenceId: null
                        fullName: Pune, Maharashtra, India
                        country: IN
                        id: '333627'
                        coordinates:
                          lat: 18.520837
                          long: 73.855403
                      - city: null
                        type: Airport
                        referenceId: null
                        fullName: Pune, India (PNQ-Lohegaon)
                        country: IN
                        id: '327935'
                        coordinates:
                          lat: 18.579057
                          long: 73.909664
      description: >-
        Resolve a location query to destination IDs and coordinates.


        Dependency notes:

        - Use the returned `destinationId`, `lat`, and `long` as inputs to
        `/mcp/hotel/search-hotels`.
      tags:
        - Hotel
      security: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotelSearchDestinationsRequest'
            examples:
              sentExample1:
                value:
                  query: Pune
                  type: DESTINATION
  /mcp/hotel/search-hotels:
    post:
      operationId: SearchHotels
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelSearchResponse'
              examples:
                example1:
                  value:
                    success: false
                    message: null
                    code: 204
                    result: null
      description: >-
        Search hotels by destination, dates, and rooms.


        Dependency notes:

        - Requires partner token (see `/mcp/auth/partner-token`).

        - Typically uses `destinationId/lat/long` from
        `/mcp/hotel/search-destinations`.

        - Response `result.correlationId` and `result.token` come from the
        provider; **persist both** and send the same
          `correlationId` on every subsequent hotel step until you start a **new** search (do not generate your own).
        - Use the returned `hotelId` as input to `/mcp/hotel/get-hotel-details`
        and `/mcp/hotel/get-rooms-and-rates`.
      tags:
        - Hotel
      security: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotelSearchRequest'
            examples:
              sentExample1:
                value:
                  long: 77.73909664
                  lat: 18.579057
                  rooms:
                    - childAges: []
                      children: <double>
                      adults: 1
                    - childAges: []
                      children: <double>
                      adults: 1
                  checkOut: '2026-05-07'
                  checkIn: '2026-05-06'
                  destinationId: '327935'
                  currency: USD
                  destinationType: '327935'
  /mcp/hotel/get-hotel-details:
    post:
      operationId: GetHotelDetails
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnyJson'
              examples:
                example1:
                  value:
                    message: Response trimmed for documentation due to size
                    type: object
                    length: 150098
      description: >-
        Get hotel content and availability details for a given hotelId.


        **Integration choice (pick one path, not both):** either call
        **`get-hotel-details`** and **`get-rooms-and-rates`**

        as two calls for the same hotel/dates, **or** call
        **`get-hotel-details-and-rates`** once. Do not use the combined

        endpoint and also duplicate the same step with the two separate
        endpoints.


        Dependency notes:

        - Requires partner token (see `/mcp/auth/partner-token`).

        - Provide `hotelId` from `/mcp/hotel/search-hotels`.

        - Pass **`token`** and **`correlationId`** from the same `search-hotels`
        response (see field descriptions).

        - The response may include an opaque `token` used by downstream calls
        (provider requirement).
      tags:
        - Hotel
      security: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotelGetHotelDetailsRequest'
            examples:
              sentExample1:
                value:
                  hotelId: '39679449'
                  contentType: ALL
                  correlationId: 1773231318764-73e160flv
                  token: d0cf4062-191d-4e76-85e2-fc506f6da92b
  /mcp/hotel/get-rooms-and-rates:
    post:
      operationId: GetRoomsAndRates
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnyJson'
              examples:
                example1:
                  value:
                    success: false
                    message: The offer you were viewing has expired
                    code: 5148
                    result: null
      description: >-
        Get rooms, rate plans, and pricing for a given hotelId.


        **Integration choice:** use this together with **`get-hotel-details`**
        **or** use **`get-hotel-details-and-rates`**

        alone—not both for the same booking step.


        Dependency notes:

        - Requires partner token (see `/mcp/auth/partner-token`).

        - Provide `hotelId` from `/mcp/hotel/search-hotels`.

        - Pass **`token`**, **`correlationId`**, dates, and `rooms` (see field
        descriptions).

        - Some providers require the `token` returned by
        `/mcp/hotel/get-hotel-details` before rooms/rates.

        - The response typically includes `recommendationId` required for
        `/mcp/hotel/revalidate`.
      tags:
        - Hotel
      security: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotelGetRoomsAndRatesRequest'
            examples:
              sentExample1:
                value:
                  rooms:
                    - adults: 2
                      children: 0
                      childAges: []
                    - adults: 2
                      children: 0
                      childAges: []
                  checkOut: '2026-05-07'
                  checkIn: '2026-05-06'
                  hotelId: '39679449'
                  publishedRate: 68.74
                  hotelName: O Hotel Pune
                  correlationId: 1773231318764-73e160flv
                  token: d0cf4062-191d-4e76-85e2-fc506f6da92b
  /mcp/hotel/get-hotel-details-and-rates:
    post:
      operationId: GetHotelDetailsAndRates
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnyJson'
              examples:
                example1:
                  value:
                    message: Response trimmed for documentation due to size
                    type: object
                    length: 150263
      description: >-
        Get hotel content and rooms/rates together in one call.


        **Integration choice:** this **replaces** calling
        **`get-hotel-details`** and **`get-rooms-and-rates`** separately

        for the same hotel, dates, and search session. Do not also call those
        two endpoints for the same user action.


        Dependency notes:

        - Requires partner token (see `/mcp/auth/partner-token`).

        - Provide `hotelId` from `/mcp/hotel/search-hotels`.

        - Provide `token`, `checkIn`, `checkOut`, and `rooms` (same meaning as
        on `get-rooms-and-rates`).

        - Executes detail + availability work and returns both payloads in
        `result`.
      tags:
        - Hotel
      security: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotelDetailsAndRatesRequest'
            examples:
              sentExample1:
                value:
                  rooms:
                    - adults: 2
                      children: 0
                      childAges: []
                    - adults: 2
                      children: 0
                      childAges: []
                  checkOut: '2026-05-07'
                  checkIn: '2026-05-06'
                  hotelId: '39679449'
                  publishedRate: 68.74
                  hotelName: O Hotel Pune
                  contentType: ALL
                  correlationId: 1773231318764-73e160flv
                  token: d0cf4062-191d-4e76-85e2-fc506f6da92b
  /mcp/hotel/get-payment-url:
    post:
      operationId: GetPaymentUrl
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentUrlResponse'
              examples:
                example1:
                  value:
