name: CI

# The "checks pass" half of the merge gate. Required on every PR to main.
# Steps are guarded so this passes on the pre-scaffold baseline (no package.json yet)
# and enforces typecheck/lint/test/build once the Next.js app exists. The integration
# job boots a local Supabase stack so DB schema + RLS tests run for real (Phase 1+).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Node app
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "has_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_app=false" >> "$GITHUB_OUTPUT"
            echo "No package.json yet — skipping app checks (pre-scaffold baseline)."
          fi

      - name: Setup Node
        if: steps.detect.outputs.has_app == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        if: steps.detect.outputs.has_app == 'true'
        run: npm ci

      - name: Typecheck
        if: steps.detect.outputs.has_app == 'true'
        run: npm run typecheck --if-present

      - name: Lint
        if: steps.detect.outputs.has_app == 'true'
        run: npm run lint --if-present

      # Unit/contract/smoke only (jsdom project) — no DB. Falls back to full `test`
      # if the split scripts aren't present yet.
      - name: Unit & contract tests
        if: steps.detect.outputs.has_app == 'true'
        run: |
          if npm run | grep -q "test:unit"; then npm run test:unit; else npm run test --if-present; fi

      - name: Build
        if: steps.detect.outputs.has_app == 'true'
        run: npm run build --if-present

  integration:
    # DB schema + RLS isolation tests against a real local Supabase stack.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect integration tests
        id: detect
        run: |
          if [ -d supabase/migrations ] && [ -d tests/integration ]; then
            echo "has_db=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_db=false" >> "$GITHUB_OUTPUT"
            echo "No migrations/integration tests yet — skipping (added in Phase 1)."
          fi

      - name: Setup Node
        if: steps.detect.outputs.has_db == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Supabase CLI
        if: steps.detect.outputs.has_db == 'true'
        uses: supabase/setup-cli@v1
        with:
          # Pinned (not `latest`): a newer CLI changed local-Postgres role/grant init and broke
          # service-role queries in CI ("permission denied for table hotels"). 2.84.2 is the
          # known-good version that matches local dev. Bump deliberately after verifying, never auto.
          version: 2.84.2

      - name: Install deps
        if: steps.detect.outputs.has_db == 'true'
        run: npm ci

      - name: Start Supabase (applies migrations)
        if: steps.detect.outputs.has_db == 'true'
        run: supabase start

      - name: Integration tests (schema + RLS)
        if: steps.detect.outputs.has_db == 'true'
        run: npm run test:integration

      - name: Stop Supabase
        if: always() && steps.detect.outputs.has_db == 'true'
        run: supabase stop || true

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect Playwright
        id: detect
        run: |
          if [ -f package.json ] && grep -q '"test:e2e"' package.json; then
            echo "has_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_e2e=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=E2E deferred::No test:e2e script — E2E (Playwright) is DEFERRED post-v1 per specs/15-test-strategy.md. This job is an intentional no-op (NOT a passing E2E suite) until a test:e2e script lands."
          fi
      - name: Setup Node
        if: steps.detect.outputs.has_e2e == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Supabase CLI
        if: steps.detect.outputs.has_e2e == 'true'
        uses: supabase/setup-cli@v1
        with:
          # Pinned (not `latest`): a newer CLI changed local-Postgres role/grant init and broke
          # service-role queries in CI ("permission denied for table hotels"). 2.84.2 is the
          # known-good version that matches local dev. Bump deliberately after verifying, never auto.
          version: 2.84.2

      - name: Install
        if: steps.detect.outputs.has_e2e == 'true'
        run: npm ci

      - name: Install Playwright (Chromium)
        if: steps.detect.outputs.has_e2e == 'true'
        run: npx playwright install --with-deps chromium

      # Boot the same local Supabase the integration job uses, then seed it deterministically
      # (10 hotels + intelligence) and create the dev user E2E signs in as. .env.e2e carries
      # ONLY public localhost-only demo keys + the E2E/dev-login flags (no secrets).
      - name: Start Supabase (applies migrations)
        if: steps.detect.outputs.has_e2e == 'true'
        run: supabase start

      - name: Seed DB + dev user
        if: steps.detect.outputs.has_e2e == 'true'
        run: |
          npm run dev:db
          npm run e2e:user

      # Build with .env.e2e exported so NEXT_PUBLIC_E2E / dev-login flags bake into the bundle.
      # Playwright's webServer then runs `next start` (also with the flags) on E2E_PORT.
      - name: Build (E2E env)
        if: steps.detect.outputs.has_e2e == 'true'
        run: set -a && . ./.env.e2e && set +a && npm run e2e:build

      - name: E2E (Playwright)
        if: steps.detect.outputs.has_e2e == 'true'
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always() && steps.detect.outputs.has_e2e == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop Supabase
        if: always() && steps.detect.outputs.has_e2e == 'true'
        run: supabase stop || true
