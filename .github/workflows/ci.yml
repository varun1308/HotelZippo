name: CI

# The "checks pass" half of the merge gate.
#
# COST/TIME OPTIMISATION (conservative path filtering):
#   - On a PULL REQUEST, a `changes` router job (dorny/paths-filter) decides which heavy jobs
#     are RELEVANT to what the PR touched. A docs/specs/workflow-only PR skips the heavy jobs and
#     finishes in seconds; a code/db/e2e change runs exactly the jobs it affects.
#   - On PUSH TO MAIN, ALL jobs run UNCONDITIONALLY (the `changes` filters are forced true), so the
#     full suite always gates main before any release — path filtering optimises PR time, never the
#     main/release gate. This is the robustness anchor.
#   - Job-level `if:` (not trigger-level `paths:`) is used deliberately: a skipped JOB reports as
#     success, so a future "required check" (if branch protection is ever enabled) is never left
#     pending. Conservative globs err toward RUNNING (any app/lib/test/db touch runs its job).
#
# Steps stay guarded so this also passes on the pre-scaffold baseline (no package.json yet).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read   # dorny/paths-filter reads the PR's changed files via the API

jobs:
  # ── Router: what changed? On push:main everything is forced true (full gate). ──────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.decide.outputs.code }}
      db: ${{ steps.decide.outputs.db }}
      e2e: ${{ steps.decide.outputs.e2e }}
    steps:
      - uses: actions/checkout@v5

      - name: Filter changed paths (PRs only)
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            code:
              - 'app/**'
              - 'lib/**'
              - 'components/**'
              - 'prompts/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'next.config.*'
              - 'jest.config.*'
              - 'tests/unit/**'
              - 'tests/contract/**'
              - 'tests/smoke/**'
              - 'tests/fixtures/**'
            db:
              - 'supabase/**'
              - 'lib/db/**'
              - 'tests/integration/**'
            e2e:
              - 'app/**'
              - 'lib/**'
              - 'components/**'
              - 'e2e/**'
              - 'playwright.config.ts'
              - '.env.e2e'
              - 'supabase/**'
              - 'scripts/dev/**'
              - 'package.json'
              - 'package-lock.json'

      # On push:main (or any non-PR trigger), force all jobs to run — the full release gate.
      # On a PR, pass through the paths-filter result.
      - name: Decide
        id: decide
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code=true"  >> "$GITHUB_OUTPUT"
            echo "db=true"    >> "$GITHUB_OUTPUT"
            echo "e2e=true"   >> "$GITHUB_OUTPUT"
            echo "Non-PR trigger (push:main) — running the FULL suite."
          else
            echo "code=${{ steps.filter.outputs.code }}" >> "$GITHUB_OUTPUT"
            echo "db=${{ steps.filter.outputs.db }}"     >> "$GITHUB_OUTPUT"
            echo "e2e=${{ steps.filter.outputs.e2e }}"   >> "$GITHUB_OUTPUT"
            echo "PR — code=${{ steps.filter.outputs.code }} db=${{ steps.filter.outputs.db }} e2e=${{ steps.filter.outputs.e2e }}"
          fi

  build-and-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Detect Node app
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "has_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_app=false" >> "$GITHUB_OUTPUT"
            echo "No package.json yet — skipping app checks (pre-scaffold baseline)."
          fi

      - name: Setup Node
        if: steps.detect.outputs.has_app == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        if: steps.detect.outputs.has_app == 'true'
        run: npm ci

      - name: Typecheck
        if: steps.detect.outputs.has_app == 'true'
        run: npm run typecheck --if-present

      - name: Lint
        if: steps.detect.outputs.has_app == 'true'
        run: npm run lint --if-present

      # Unit/contract/smoke only (jsdom project) — no DB. Falls back to full `test`
      # if the split scripts aren't present yet.
      - name: Unit & contract tests
        if: steps.detect.outputs.has_app == 'true'
        run: |
          if npm run | grep -q "test:unit"; then npm run test:unit; else npm run test --if-present; fi

      - name: Build
        if: steps.detect.outputs.has_app == 'true'
        run: npm run build --if-present

  integration:
    # DB schema + RLS isolation tests against a real local Supabase stack.
    needs: changes
    if: needs.changes.outputs.db == 'true' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Detect integration tests
        id: detect
        run: |
          if [ -d supabase/migrations ] && [ -d tests/integration ]; then
            echo "has_db=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_db=false" >> "$GITHUB_OUTPUT"
            echo "No migrations/integration tests yet — skipping (added in Phase 1)."
          fi

      - name: Setup Node
        if: steps.detect.outputs.has_db == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Supabase CLI
        if: steps.detect.outputs.has_db == 'true'
        uses: supabase/setup-cli@v1
        with:
          # Pinned (not `latest`): a newer CLI changed local-Postgres role/grant init and broke
          # service-role queries in CI ("permission denied for table hotels"). 2.84.2 is the
          # known-good version that matches local dev. Bump deliberately after verifying, never auto.
          version: 2.84.2

      - name: Install deps
        if: steps.detect.outputs.has_db == 'true'
        run: npm ci

      - name: Start Supabase (applies migrations)
        if: steps.detect.outputs.has_db == 'true'
        run: supabase start

      - name: Integration tests (schema + RLS)
        if: steps.detect.outputs.has_db == 'true'
        run: npm run test:integration

      - name: Stop Supabase
        if: always() && steps.detect.outputs.has_db == 'true'
        run: supabase stop || true

  e2e:
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Detect Playwright
        id: detect
        run: |
          if [ -f package.json ] && grep -q '"test:e2e"' package.json; then
            echo "has_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_e2e=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=E2E deferred::No test:e2e script — E2E (Playwright) is DEFERRED post-v1 per specs/15-test-strategy.md. This job is an intentional no-op (NOT a passing E2E suite) until a test:e2e script lands."
          fi
      - name: Setup Node
        if: steps.detect.outputs.has_e2e == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Supabase CLI
        if: steps.detect.outputs.has_e2e == 'true'
        uses: supabase/setup-cli@v1
        with:
          # Pinned (not `latest`): a newer CLI changed local-Postgres role/grant init and broke
          # service-role queries in CI ("permission denied for table hotels"). 2.84.2 is the
          # known-good version that matches local dev. Bump deliberately after verifying, never auto.
          version: 2.84.2

      - name: Install
        if: steps.detect.outputs.has_e2e == 'true'
        run: npm ci

      # Cache the Playwright browser to skip the ~30-60s Chromium download on every run.
      # Keyed on the installed Playwright version so a version bump busts the cache automatically.
      - name: Resolve Playwright version
        if: steps.detect.outputs.has_e2e == 'true'
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        if: steps.detect.outputs.has_e2e == 'true'
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      # Cache hit → only install the OS deps (fast); miss → install the browser too.
      - name: Install Playwright (Chromium)
        if: steps.detect.outputs.has_e2e == 'true'
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" == "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

      # Boot the same local Supabase the integration job uses, then seed it deterministically
      # (10 hotels + intelligence) and create the dev user E2E signs in as. .env.e2e carries
      # ONLY public localhost-only demo keys + the E2E/dev-login flags (no secrets).
      - name: Start Supabase (applies migrations)
        if: steps.detect.outputs.has_e2e == 'true'
        run: supabase start

      - name: Seed DB + dev user
        if: steps.detect.outputs.has_e2e == 'true'
        run: |
          npm run dev:db
          npm run e2e:user

      # Build with .env.e2e exported so NEXT_PUBLIC_E2E / dev-login flags bake into the bundle.
      # Playwright's webServer then runs `next start` (also with the flags) on E2E_PORT.
      - name: Build (E2E env)
        if: steps.detect.outputs.has_e2e == 'true'
        run: set -a && . ./.env.e2e && set +a && npm run e2e:build

      - name: E2E (Playwright)
        if: steps.detect.outputs.has_e2e == 'true'
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always() && steps.detect.outputs.has_e2e == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop Supabase
        if: always() && steps.detect.outputs.has_e2e == 'true'
        run: supabase stop || true
